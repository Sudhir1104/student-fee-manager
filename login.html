<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login – Srishti Centre</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

*{ box-sizing:border-box; margin:0; padding:0; }

body{
  font-family: Arial, sans-serif;
  background: #eef2f7;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.card{
  background: white;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  padding: 40px 35px;
  width: 100%;
  max-width: 400px;
}

.header{
  text-align: center;
  margin-bottom: 30px;
}

.header img{
  height: 70px;
  margin-bottom: 12px;
}

.header h1{
  font-size: 18px;
  color: #2d89ef;
}

.header p{
  font-size: 13px;
  color: #888;
  margin-top: 4px;
}

label{
  display: block;
  font-size: 13px;
  color: #555;
  margin-bottom: 4px;
  margin-top: 16px;
}

input[type="email"],
input[type="password"]{
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid #ccc;
  border-radius: 7px;
  font-size: 14px;
  transition: border 0.2s;
  outline: none;
}

input:focus{
  border-color: #2d89ef;
  box-shadow: 0 0 0 3px rgba(45,137,239,0.12);
}

.login-btn{
  width: 100%;
  margin-top: 24px;
  padding: 12px;
  background: #2d89ef;
  color: white;
  border: none;
  border-radius: 7px;
  font-size: 15px;
  cursor: pointer;
  transition: background 0.2s;
}

.login-btn:hover{
  background: #1b5fbf;
}

.login-btn:disabled{
  background: #aaa;
  cursor: not-allowed;
}

.error{
  margin-top: 14px;
  padding: 10px 14px;
  background: #fdecea;
  border: 1px solid #f5c6c2;
  border-radius: 6px;
  color: #c0392b;
  font-size: 13px;
  display: none;
}

.footer{
  text-align: center;
  margin-top: 30px;
  font-size: 12px;
  color: #aaa;
}

</style>
</head>
<body>

<div class="card">

  <div class="header">
    <img src="logo.png" onerror="this.style.display='none'">
    <h1>Srishti Centre for Performing Arts</h1>
    <p>Sign in to access the Fee Manager</p>
  </div>

  <label>Email</label>
  <input type="email" id="email" placeholder="you@example.com">

  <label>Password</label>
  <input type="password" id="password" placeholder="••••••••">

  <button class="login-btn" id="loginBtn" onclick="login()">Sign In</button>

  <div class="error" id="errorMsg"></div>

  <div class="footer">© Srishti Centre for Performing Arts</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDHJhlNzrAv5iPgvv5b2WmByfDczJCNkNY",
  authDomain: "student-fee-manager-98c51.firebaseapp.com",
  projectId: "student-fee-manager-98c51",
  storageBucket: "student-fee-manager-98c51.firebasestorage.app",
  messagingSenderId: "463103595080",
  appId: "1:463103595080:web:3f0e964edd906fb1d23e7d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// If already logged in, go straight to app
onAuthStateChanged(auth, (user) => {
  if(user) window.location.href = "index.html";
});

async function login(){

  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value;
  let btn = document.getElementById("loginBtn");
  let err = document.getElementById("errorMsg");

  err.style.display = "none";
  btn.disabled = true;
  btn.textContent = "Signing in...";

  try {
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = "index.html";
  } catch(e) {
    let msg = "Login failed. Please check your email and password.";
    if(e.code === "auth/user-not-found") msg = "No account found with this email.";
    if(e.code === "auth/wrong-password") msg = "Incorrect password.";
    if(e.code === "auth/invalid-email") msg = "Invalid email address.";
    if(e.code === "auth/too-many-requests") msg = "Too many attempts. Try again later.";
    err.textContent = msg;
    err.style.display = "block";
  }

  btn.disabled = false;
  btn.textContent = "Sign In";

}

// Allow pressing Enter to submit
document.addEventListener("keydown", (e) => {
  if(e.key === "Enter") login();
});

window.login = login;

</script>

</body>
</html>
