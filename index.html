<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Fee Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">

<style>

body{font-family:Arial;background:#eef2f7;margin:0;padding:20px}

.header{text-align:center;margin-bottom:20px}
.header img{height:80px;margin:auto;display:block}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.15)
}

input,button{
padding:10px;
margin:5px 0;
width:100%;
border-radius:6px;
border:1px solid #ccc
}

button{
background:#2d89ef;
color:white;
border:none;
cursor:pointer
}

button:hover{background:#1b5fbf}

.reminder-btn{background:#e53935}

.overdue{color:#e53935;font-weight:bold}

.disabled-btn{
background:#ccc;
color:#666;
padding:6px 10px;
border-radius:5px
}

.dashboard{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap
}

.card{
flex:1;
background:#2d89ef;
color:white;
padding:15px;
border-radius:8px
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px
}

th,td{padding:8px;border-bottom:1px solid #ddd}

.whatsapp{
background:#25D366;
padding:5px 10px;
border-radius:5px;
color:white;
text-decoration:none
}

.mobile-card{
background:#f8f8f8;
border-radius:10px;
padding:12px;
margin-bottom:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1)
}

.mobile-list{display:none}

@media(max-width:700px){

table{display:none}
.mobile-list{display:block}

}

</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="logo.png">
<h1>Student Fee Manager</h1>
</div>

<div class="dashboard">
<div class="card" id="students">Students: 0</div>
<div class="card" id="collected">Collected: ₹0</div>
<div class="card" id="pending">Pending: ₹0</div>
<div class="card" id="overdue">Overdue: 0</div>
</div>

<button id="reminderButton" class="reminder-btn" onclick="sendReminders()">
Send reminders (0 overdue)
</button>

<input id="name" placeholder="Student Name">
<input id="phone" placeholder="Parent Phone">
<input id="course" placeholder="Course">
<input id="fee" type="number" placeholder="Fee">
<input id="due" type="date">

<button onclick="addStudent()">Add Student</button>
<button onclick="downloadReport()">Download Excel</button>

<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Course</th>
<th>Fee</th>
<th>Late</th>
<th>Total</th>
<th>Status</th>
<th>Action</th>
<th>Reminder</th>
<th>QR</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<div id="mobileList" class="mobile-list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyDHJhlNzrAv5iPgvv5b2WmByfDczJCNkNY",
authDomain:"student-fee-manager-98c51.firebaseapp.com",
projectId:"student-fee-manager-98c51",
storageBucket:"student-fee-manager-98c51.firebasestorage.app",
messagingSenderId:"463103595080",
appId:"1:463103595080:web:3f0e964edd906fb1d23e7d"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let students=[];

/* CLEAN PHONE */

function cleanPhone(phone){

phone = phone.replace(/\D/g,'');

if(!phone.startsWith("91")){
phone = "91"+phone;
}

return phone;

}

/* WHATSAPP LINK */

function reminderLink(phone,name,total){

phone = cleanPhone(phone);

let message = "Hello, fee for "+name+" is ₹"+total+". Please make payment.";

return "https://api.whatsapp.com/send?phone="+phone+"&text="+encodeURIComponent(message);

}

/* LOAD */

async function loadStudents(){

students=[];

const querySnapshot=await getDocs(collection(db,"students"));

querySnapshot.forEach((docSnap)=>{

let data=docSnap.data();
data.id=docSnap.id;
students.push(data);

});

render();

}

/* ADD */

async function addStudent(){

let student={
name:name.value,
phone:cleanPhone(phone.value),
course:course.value,
fee:fee.value,
due:due.value,
paid:false
};

await addDoc(collection(db,"students"),student);

document.querySelectorAll("input").forEach(i=>i.value="");

loadStudents();

}

/* MARK PAID */

async function markPaid(id){

const ref=doc(db,"students",id);

await updateDoc(ref,{paid:true});

loadStudents();

}

/* DELETE */

async function deleteStudent(id){

if(!confirm("Delete this student record?")) return;

const ref=doc(db,"students",id);

await deleteDoc(ref);

loadStudents();

}

/* EDIT */

async function editStudent(id){

let s=students.find(x=>x.id==id);

let newPhone=prompt("Edit Phone",s.phone);
let newFee=prompt("Edit Fee",s.fee);

const ref=doc(db,"students",id);

await updateDoc(ref,{
phone:cleanPhone(newPhone),
fee:newFee
});

loadStudents();

}

/* QR PAYMENT */

function paymentQR(name,amount){

let upi="schoolfees@upi";

let url=`upi://pay?pa=${upi}&pn=${name}&am=${amount}`;

let qr=`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}`;

window.open(qr);

}

/* REMINDER */

function sendReminders(){

students.forEach((s)=>{

let today=new Date();
let due=new Date(s.due);

if(!s.paid && today>due){

window.open(reminderLink(s.phone,s.name,s.fee));

}

});

}

/* EXPORT */

function downloadReport(){

let csv="Name,Phone,Course,Fee,Due,Status\n";

students.forEach(s=>{

csv+=`${s.name},${s.phone},${s.course},${s.fee},${s.due},${s.paid?"Paid":"Pending"}\n`;

});

let blob=new Blob([csv]);
let url=URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="fees.csv";
a.click();

}

/* RENDER */

function render(){

let tbody=document.getElementById("table");
let mobile=document.getElementById("mobileList");

tbody.innerHTML="";
mobile.innerHTML="";

let overdueCount=0;
let collected=0;
let pending=0;

students.forEach(s=>{

let today=new Date();
let due=new Date(s.due);

let late=0;
let status="Pending";

if(!s.paid && today>due){

let diff=Math.floor((today-due)/(1000*60*60*24));
late=diff*10;

status="Overdue";
overdueCount++;

}

if(s.paid)status="Paid";

let total=parseInt(s.fee)+late;

if(s.paid)collected+=total;
else pending+=total;

let reminder=s.paid
?'<span class="disabled-btn">Paid</span>'
:`<a class="whatsapp" target="_blank" href="${reminderLink(s.phone,s.name,total)}">Reminder</a>`;

let row=`
<tr>
<td>${s.name}</td>
<td>${s.phone}</td>
<td>${s.course}</td>
<td>₹${s.fee}</td>
<td>₹${late}</td>
<td>₹${total}</td>
<td class="${status=='Overdue'?'overdue':''}">${status}</td>
<td>
<button onclick="editStudent('${s.id}')">Edit</button>
<button onclick="markPaid('${s.id}')">Paid</button>
<button onclick="deleteStudent('${s.id}')">Delete</button>
</td>
<td>${reminder}</td>
<td><button onclick="paymentQR('${s.name}',${total})">QR Pay</button></td>
</tr>
`;

tbody.innerHTML+=row;

mobile.innerHTML+=`
<div class="mobile-card">

<h3>${s.name}</h3>

Fee ₹${total}<br>
Status <span class="${status=='Overdue'?'overdue':''}">${status}</span>

<br><br>

<button onclick="editStudent('${s.id}')">Edit</button>
<button onclick="markPaid('${s.id}')">Paid</button>
<button onclick="deleteStudent('${s.id}')">Delete</button>

<br><br>

${reminder}
<button onclick="paymentQR('${s.name}',${total})">QR Pay</button>

</div>
`;

});

studentsDiv.innerText="Students: "+students.length;
collectedDiv.innerText="Collected: ₹"+collected;
pendingDiv.innerText="Pending: ₹"+pending;
overdueDiv.innerText="Overdue: "+overdueCount;

document.getElementById("reminderButton").innerText=
"Send reminders ("+overdueCount+" overdue)";

}

window.addStudent=addStudent;
window.markPaid=markPaid;
window.deleteStudent=deleteStudent;
window.editStudent=editStudent;
window.paymentQR=paymentQR;
window.sendReminders=sendReminders;
window.downloadReport=downloadReport;

loadStudents();

</script>

</body>
</html>
