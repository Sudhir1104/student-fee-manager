<body>

<div class="container" style="display:none">

<div class="header">

<div class="header-row">

<div class="logo-row">
<img src="logo.png" alt="Logo" onerror="this.style.display='none'">
<div class="title-block">
<h1>Srishti Centre for Performing Arts</h1>
<h2>Student Fee Manager</h2>
<p style="font-size: 14px; margin: 5px 0 0 0;">Late Fee: ₹100 after 10th of every month</p>
</div>
</div>

<div style="text-align:right">
<div class="user-info" id="userEmail"></div>
<button class="logout-btn" onclick="logout()">Sign Out</button>
</div>

</div>

</div>

<div class="dashboard">
<div class="card" id="students">Students: 0</div>
<div class="card" id="collected">Collected: ₹0</div>
<div class="card" id="pending">Pending: ₹0</div>
<div class="card" id="overdue">Overdue: 0</div>
<div class="card" id="lateFees">Late Fees: ₹0</div>
</div>

<button id="reminderButton" class="reminder-btn" onclick="sendReminders()">
📩 Send Fine Notice to All Overdue Students (After 10th of Month)
</button>

<!-- Search Bar -->
<div class="search-wrapper">
<span class="search-icon">🔍</span>
<input id="searchInput" placeholder="Search student by name..." onkeyup="render()">
</div>

<input id="name" placeholder="Student Name">
<input id="phone" placeholder="Parent Phone">
<input id="course" placeholder="Course">
<input id="fee" type="number" placeholder="Monthly Fee">
<input id="due" type="date" value="2026-03-10">

<button onclick="addStudent()">Add Student</button>
<button onclick="downloadReport()">Download Excel</button>

<table>

<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Course</th>
<th>Monthly Fee</th>
<th>Late Fee</th>
<th>Total</th>
<th>Status</th>
<th>Due Date</th>
<th>Actions</th>
<th>Reminder</th>
<th>QR</th>
<th>Receipt</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<div id="mobileList" class="mobile-list"></div>

<div class="footer">
© Srishti Centre for Performing Arts
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyDHJhlNzrAv5iPgvv5b2WmByfDczJCNkNY",
authDomain:"student-fee-manager-98c51.firebaseapp.com",
projectId:"student-fee-manager-98c51",
storageBucket:"student-fee-manager-98c51.firebasestorage.app",
messagingSenderId:"463103595080",
appId:"1:463103595080:web:3f0e964edd906fb1d23e7d"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

// Global students array
let students=[];

// Constants
const LATE_FEE_AMOUNT = 100;
const LATE_FEE_DAY = 10; // 10th of every month

// Auth guard – redirect to login if not signed in
onAuthStateChanged(auth,(user)=>{
  if(!user){
    window.location.href="login.html";
  } else {
    document.getElementById("userEmail").textContent=user.email;
    document.querySelector(".container").style.display="block";
    loadStudents();
  }
});

async function logout(){
  await signOut(auth);
  window.location.href="login.html";
}

function cleanPhone(phone){
phone=phone.replace(/\D/g,'');
if(!phone.startsWith("91")) phone="91"+phone;
return phone;
}

// Function to calculate late fee based on 10th of month rule
function calculateLateFee(dueDate, isPaid) {
  if (isPaid) return 0;
  
  let today = new Date();
  today.setHours(0,0,0,0);
  
  let due = new Date(dueDate);
  due.setHours(0,0,0,0);
  
  // Get the 10th of current month
  let currentMonth10th = new Date(today.getFullYear(), today.getMonth(), LATE_FEE_DAY);
  currentMonth10th.setHours(0,0,0,0);
  
  // Get the 10th of due date's month
  let dueMonth10th = new Date(due.getFullYear(), due.getMonth(), LATE_FEE_DAY);
  dueMonth10th.setHours(0,0,0,0);
  
  // If today is after the 10th of current month AND payment is not made
  if (today > currentMonth10th) {
    // Check if the due date was before or on the 10th of its month
    // If due date was after the 10th, they should have paid by the 10th of next month
    if (due <= dueMonth10th) {
      // They should have paid by the 10th of due date's month
      if (today > dueMonth10th) {
        return LATE_FEE_AMOUNT;
      }
    } else {
      // They should have paid by the 10th of next month
      let nextMonth10th = new Date(due.getFullYear(), due.getMonth() + 1, LATE_FEE_DAY);
      nextMonth10th.setHours(0,0,0,0);
      if (today > nextMonth10th) {
        return LATE_FEE_AMOUNT;
      }
    }
  }
  
  return 0;
}

// Simplified version - if today is after the 10th and not paid, add late fee
function calculateSimpleLateFee(dueDate, isPaid) {
  if (isPaid) return 0;
  
  let today = new Date();
  today.setHours(0,0,0,0);
  
  let due = new Date(dueDate);
  due.setHours(0,0,0,0);
  
  // Get current month and year
  let currentYear = today.getFullYear();
  let currentMonth = today.getMonth();
  
  // Create date for 10th of current month
  let tenthOfCurrentMonth = new Date(currentYear, currentMonth, LATE_FEE_DAY);
  tenthOfCurrentMonth.setHours(0,0,0,0);
  
  // If today is on or after the 10th of current month
  if (today >= tenthOfCurrentMonth) {
    // Check if the due date was before this month's 10th
    // Or if it's a new month and payment hasn't been made
    return LATE_FEE_AMOUNT;
  }
  
  return 0;
}

function sendReminder(phone, name, baseFee, lateFee, total){
phone=cleanPhone(phone);
let message=
"Dear Parent,\n\n"+
"This is a reminder that the fee for *" + name + "* is overdue.\n\n"+
"Monthly Fee: ₹" + baseFee + "\n" +
"Late Fee (after 10th): ₹" + lateFee + "\n" +
"Total Due: ₹" + total + "\n\n"+
"Please make payment immediately to avoid further penalties.\n\n"+
"Srishti Centre for Performing Arts\n" +
"Note: Late fee of ₹100 applies after the 10th of every month.";

let url="https://api.whatsapp.com/send?phone="+phone+"&text="+encodeURIComponent(message);
window.open(url,'_blank');
}

function sendReceipt(phone,name,amount,receipt,date,lateFee){
phone=cleanPhone(phone);
let message=
"Srishti Centre for Performing Arts\n\n"+
"RECEIPT\n\n"+
"Receipt No: " + receipt + "\n"+
"Student: " + name + "\n"+
"Monthly Fee: ₹" + (amount - lateFee) + "\n"+
"Late Fee: ₹" + lateFee + "\n"+
"Total Amount Paid: ₹" + amount + "\n"+
"Date: " + date + "\n\n"+
"Thank you for your payment.\n"+
"Next month's fee is due by the 10th.";

let url="https://api.whatsapp.com/send?phone="+phone+"&text="+encodeURIComponent(message);
window.open(url,'_blank');
}

async function loadStudents(){
try {
  students = [];
  const querySnapshot = await getDocs(collection(db, "students"));
  
  querySnapshot.forEach((docSnap) => {
    let data = docSnap.data();
    data.id = docSnap.id;
    students.push(data);
  });
  
  render();
} catch (error) {
  console.error("Error loading students:", error);
  alert("Error loading students. Please check console for details.");
}
}

async function addStudent(){
try {
  // Validate inputs
  let name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.trim();
  let course = document.getElementById("course").value.trim();
  let fee = document.getElementById("fee").value;
  let due = document.getElementById("due").value;
  
  if (!name || !phone || !course || !fee || !due) {
    alert("Please fill in all fields");
    return;
  }
  
  let student = {
    name: name,
    phone: cleanPhone(phone),
    course: course,
    fee: fee,
    due: due,
    paid: false,
    createdAt: new Date().toISOString()
  };
  
  await addDoc(collection(db, "students"), student);
  
  // Clear inputs
  document.getElementById("name").value = "";
  document.getElementById("phone").value = "";
  document.getElementById("course").value = "";
  document.getElementById("fee").value = "";
  document.getElementById("due").value = "2026-03-10";
  
  await loadStudents();
  alert("Student added successfully!");
  
} catch (error) {
  console.error("Error adding student:", error);
  alert("Error adding student. Please try again.");
}
}

async function markPaid(id){
try {
  // Find the student to get their fee and late fee
  let student = students.find(s => s.id == id);
  if (!student) return;
  
  let lateFee = calculateSimpleLateFee(student.due, false);
  let total = parseInt(student.fee) + lateFee;
  
  let receipt = "RCPT-" + Date.now();
  let date = new Date().toISOString().slice(0,10);
  
  await updateDoc(doc(db, "students", id), {
    paid: true,
    receiptNumber: receipt,
    paidDate: date,
    lateFeePaid: lateFee,
    totalPaid: total
  });
  
  alert("Payment recorded. Receipt No: " + receipt + "\nAmount: ₹" + total + " (Includes late fee: ₹" + lateFee + ")");
  await loadStudents();
  
} catch (error) {
  console.error("Error marking as paid:", error);
  alert("Error recording payment. Please try again.");
}
}

async function deleteStudent(id){
if(!confirm("Delete this student?")) return;

try {
  await deleteDoc(doc(db, "students", id));
  await loadStudents();
  alert("Student deleted successfully!");
} catch (error) {
  console.error("Error deleting student:", error);
  alert("Error deleting student. Please try again.");
}
}

async function editStudent(id){
try {
  let s = students.find(x => x.id == id);
  if (!s) return;
  
  let newPhone = prompt("Edit phone (with country code)", s.phone);
  if (newPhone === null) return;
  
  let newFee = prompt("Edit monthly fee amount", s.fee);
  if (newFee === null) return;
  
  await updateDoc(doc(db, "students", id), {
    phone: cleanPhone(newPhone),
    fee: newFee
  });
  
  await loadStudents();
  alert("Student updated successfully!");
  
} catch (error) {
  console.error("Error editing student:", error);
  alert("Error updating student. Please try again.");
}
}

function paymentQR(name, amount){
let upi = "61407789476@icici";
let url = `upi://pay?pa=${upi}&pn=${encodeURIComponent(name)}&am=${amount}`;
let qr = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}`;
window.open(qr,'_blank');
}

function sendReminders(){
let count = 0;
let today = new Date();
today.setHours(0,0,0,0);

// Get the 10th of current month
let tenthOfMonth = new Date(today.getFullYear(), today.getMonth(), LATE_FEE_DAY);
tenthOfMonth.setHours(0,0,0,0);

// Only send reminders if today is on or after the 10th
if (today < tenthOfMonth) {
  alert("Reminders can only be sent on or after the 10th of the month.");
  return;
}

students.forEach((s)=>{
  if (!s.paid) {
    let lateFee = calculateSimpleLateFee(s.due, false);
    if (lateFee > 0) {
      let total = parseInt(s.fee) + lateFee;
      sendReminder(s.phone, s.name, s.fee, lateFee, total);
      count++;
    }
  }
});

if(count===0) alert("No overdue students found for this month.");
}

function downloadReport(){
let csv = "Name,Phone,Course,Monthly Fee,Due Date,Status,Late Fee,Total,Receipt Number,Paid Date\n";

students.forEach(s=>{
  let lateFee = calculateSimpleLateFee(s.due, s.paid);
  let total = parseInt(s.fee || 0) + lateFee;
  let status = s.paid ? "Paid" : "Pending";
  
  csv += `"${s.name}","${s.phone}","${s.course}","${s.fee}","${s.due}","${status}","${lateFee}","${total}","${s.receiptNumber || ''}","${s.paidDate || ''}"\n`;
});

let blob = new Blob([csv], { type: 'text/csv' });
let url = URL.createObjectURL(blob);

let a = document.createElement("a");
a.href = url;
a.download = "student_fees_report.csv";
a.click();

URL.revokeObjectURL(url);
}

function render(){
let tbody = document.getElementById("table");
let mobile = document.getElementById("mobileList");

if (!tbody || !mobile) return;

tbody.innerHTML = "";
mobile.innerHTML = "";

let overdueCount = 0;
let collected = 0;
let pending = 0;
let totalLateFees = 0;
let today = new Date();
today.setHours(0,0,0,0);

// Get the 10th of current month for display
let tenthOfMonth = new Date(today.getFullYear(), today.getMonth(), LATE_FEE_DAY);
tenthOfMonth.setHours(0,0,0,0);
let isAfterTenth = today >= tenthOfMonth;

// Get search query
let query = document.getElementById("searchInput").value.trim().toLowerCase();

// Filter students by name
let filtered = query
  ? students.filter(s => s.name && s.name.toLowerCase().includes(query))
  : students;

// Dashboard calculations using ALL students
students.forEach(s => {
  let lateFee = calculateSimpleLateFee(s.due, s.paid);
  let total = parseInt(s.fee || 0) + lateFee;
  
  if (s.paid) {
    collected += total;
  } else {
    pending += total;
    if (lateFee > 0) {
      overdueCount++;
    }
  }
  totalLateFees += lateFee;
});

// Update dashboard
document.getElementById("students").innerHTML = "Students: " + students.length;
document.getElementById("collected").innerHTML = "Collected: ₹" + collected;
document.getElementById("pending").innerHTML = "Pending: ₹" + pending;
document.getElementById("overdue").innerHTML = "Overdue: " + overdueCount;
document.getElementById("lateFees").innerHTML = "Late Fees: ₹" + totalLateFees;

// Show no results message if needed
if (filtered.length === 0 && query) {
  let noResultsMsg = `<tr><td colspan="12" class="no-results">No student found matching "${query}"</td></tr>`;
  tbody.innerHTML = noResultsMsg;
  mobile.innerHTML = `<div class="no-results">No student found matching "${query}"</div>`;
}

// Render filtered students
filtered.forEach(s => {
  let lateFee = calculateSimpleLateFee(s.due, s.paid);
  let total = parseInt(s.fee || 0) + lateFee;
  let status = "Pending";
  
  if (s.paid) {
    status = "Paid";
  } else if (lateFee > 0) {
    status = "Overdue (Late Fee Applied)";
  }
  
  // Format due date for display
  let dueDate = new Date(s.due);
  let formattedDueDate = dueDate.toLocaleDateString('en-IN', {
    year: 'numeric',
    month: 'short',
    day: 'numeric'
  });
  
  // Add indicator if late fee applies
  let lateFeeIndicator = lateFee > 0 ? ' <span class="late-fee-badge">+₹' + lateFee + '</span>' : '';
  
  // Escape special characters for HTML attributes
  let safePhone = (s.phone || '').replace(/'/g, "&apos;");
  let safeName = (s.name || '').replace(/'/g, "&apos;");
  let safeReceipt = (s.receiptNumber || 'N/A').replace(/'/g, "&apos;");
  let safePaidDate = (s.paidDate || '').replace(/'/g, "&apos;");
  
  // Reminder button - only show if after 10th and not paid
  let reminder = s.paid
    ? '<span class="disabled-btn">Paid</span>'
    : (isAfterTenth 
        ? `<button onclick="sendReminder('${safePhone}','${safeName}','${s.fee}','${lateFee}','${total}')">📱 Send Reminder</button>`
        : '<span class="disabled-btn">Reminder (after 10th)</span>');
  
  // Receipt button
  let receipt = s.paid
    ? `<button onclick="sendReceipt('${safePhone}','${safeName}','${total}','${safeReceipt}','${safePaidDate}','${lateFee}')">📱 Resend Receipt</button>`
    : "";
  
  // Table row
  tbody.innerHTML += `
<tr>
  <td>${s.name || ''} ${lateFee > 0 ? '<span class="late-fee-badge">Late</span>' : ''}</td>
  <td>${s.phone || ''}</td>
  <td>${s.course || ''}</td>
  <td>₹${s.fee || 0}</td>
  <td>₹${lateFee}</td>
  <td><strong>₹${total}</strong></td>
  <td class="${lateFee > 0 ? 'overdue' : ''}">${status}</td>
  <td>${formattedDueDate}</td>
  <td>
    <button onclick="editStudent('${s.id}')">✏️ Edit</button>
    <button onclick="markPaid('${s.id}')">✅ Paid</button>
    <button onclick="deleteStudent('${s.id}')">🗑️ Delete</button>
  </td>
  <td>${reminder}</td>
  <td><button onclick="paymentQR('${safeName}',${total})">📱 QR Pay</button></td>
  <td>${receipt}</td>
</tr>
`;
  
  // Mobile card
  mobile.innerHTML += `
<div class="mobile-card">
  <h3>${s.name || ''} ${lateFee > 0 ? '<span class="late-fee-badge">Late Fee Applied</span>' : ''}</h3>
  <strong>Course:</strong> ${s.course || ''}<br>
  <strong>Phone:</strong> ${s.phone || ''}<br>
  <strong>Monthly Fee:</strong> ₹${s.fee || 0}<br>
  <strong>Late Fee:</strong> ₹${lateFee}<br>
  <strong>Total Due:</strong> ₹${total}<br>
  <strong>Status:</strong> <span class="${lateFee > 0 ? 'overdue' : ''}">${status}</span><br>
  <strong>Due Date:</strong> ${formattedDueDate}<br>
  ${lateFee > 0 ? '<div class="late-fee-info">⚠️ Late fee of ₹100 applied (after 10th of month)</div>' : ''}
  <br>
  
  <button onclick="editStudent('${s.id}')">✏️ Edit</button>
  <button onclick="markPaid('${s.id}')">✅ Mark Paid</button>
  <button onclick="deleteStudent('${s.id}')">🗑️ Delete</button>
  <br><br>
  ${reminder}
  <button onclick="paymentQR('${safeName}',${total})">📱 QR Pay</button>
  ${receipt}
</div>
`;
});
}

// Make functions globally available
window.addStudent = addStudent;
window.markPaid = markPaid;
window.deleteStudent = deleteStudent;
window.editStudent = editStudent;
window.paymentQR = paymentQR;
window.sendReminder = sendReminder;
window.sendReminders = sendReminders;
window.sendReceipt = sendReceipt;
window.downloadReport = downloadReport;
window.render = render;
window.logout = logout;

</script>

</body>
</html>
