<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Srishti Centre Fee Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
background:#eef2f7;
margin:0;
padding:20px;
}

.header{
background:#2d89ef;
border-radius:10px;
padding:15px 20px;
margin-bottom:20px;
color:white;
}

.logo-row{
display:flex;
align-items:center;
gap:15px;
flex:1;
}

.header-row{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
}

.logout-btn{
background:rgba(255,255,255,0.2);
color:white;
border:1px solid rgba(255,255,255,0.5);
padding:8px 16px;
border-radius:6px;
cursor:pointer;
font-size:13px;
white-space:nowrap;
width:auto;
margin:0;
}

.logout-btn:hover{
background:rgba(255,255,255,0.35);
}

.user-info{
font-size:12px;
opacity:0.85;
text-align:right;
}

/* Hide entire page until auth check completes */
.page-hidden{
display:none;
}

.logo-row img{
height:70px;
}

.title-block h1{
margin:0;
font-size:22px;
}

.title-block h2{
margin:0;
font-size:15px;
opacity:0.9;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.15);
}

input,button{
padding:10px;
margin:5px 0;
width:100%;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#2d89ef;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#1b5fbf;
}

.reminder-btn{
background:#e53935;
}

.overdue{
color:#e53935;
font-weight:bold;
}

.disabled-btn{
background:#ccc;
color:#666;
padding:6px 10px;
border-radius:5px;
}

.dashboard{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.card{
flex:1;
background:#2d89ef;
color:white;
padding:15px;
border-radius:8px;
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
}

.mobile-card{
background:#f8f8f8;
border-radius:10px;
padding:12px;
margin-bottom:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.mobile-list{
display:none;
}

/* Search bar styles */
.search-wrapper{
position:relative;
margin-bottom:15px;
}

.search-wrapper input{
padding-left:38px;
border:2px solid #2d89ef;
font-size:15px;
margin:0;
}

.search-wrapper input:focus{
outline:none;
border-color:#1b5fbf;
box-shadow:0 0 0 3px rgba(45,137,239,0.15);
}

.search-icon{
position:absolute;
left:11px;
top:50%;
transform:translateY(-50%);
color:#2d89ef;
font-size:16px;
pointer-events:none;
}

.no-results{
text-align:center;
color:#999;
padding:20px;
font-style:italic;
}

@media(max-width:700px){

table{display:none}
.mobile-list{display:block}

.logo-row{
flex-direction:column;
text-align:center;
}

}

.footer{
text-align:center;
margin-top:20px;
font-size:13px;
color:#666;
}

</style>
</head>

<body>

<div class="container" style="display:none">

<div class="header">

<div class="header-row">

<div class="logo-row">
<img src="logo.png">
<div class="title-block">
<h1>Srishti Centre for Performing Arts</h1>
<h2>Student Fee Manager</h2>
</div>
</div>

<div style="text-align:right">
<div class="user-info" id="userEmail"></div>
<button class="logout-btn" onclick="logout()">Sign Out</button>
</div>

</div>

</div>

<div class="dashboard">
<div class="card" id="students">Students: 0</div>
<div class="card" id="collected">Collected: ₹0</div>
<div class="card" id="pending">Pending: ₹0</div>
<div class="card" id="overdue">Overdue: 0</div>
</div>

<button id="reminderButton" class="reminder-btn" onclick="sendReminders()">
Send reminders
</button>

<!-- Search Bar -->
<div class="search-wrapper">
<span class="search-icon">🔍</span>
<input id="searchInput" placeholder="Search student by name..." oninput="render()">
</div>

<input id="name" placeholder="Student Name">
<input id="phone" placeholder="Parent Phone">
<input id="course" placeholder="Course">
<input id="fee" type="number" placeholder="Fee">
<input id="due" type="date">

<button onclick="addStudent()">Add Student</button>
<button onclick="downloadReport()">Download Excel</button>

<table>

<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Course</th>
<th>Fee</th>
<th>Late</th>
<th>Total</th>
<th>Status</th>
<th>Actions</th>
<th>Reminder</th>
<th>QR</th>
<th>Receipt</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<div id="mobileList" class="mobile-list"></div>

<div class="footer">
© Srishti Centre for Performing Arts
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyDHJhlNzrAv5iPgvv5b2WmByfDczJCNkNY",
authDomain:"student-fee-manager-98c51.firebaseapp.com",
projectId:"student-fee-manager-98c51",
storageBucket:"student-fee-manager-98c51.firebasestorage.app",
messagingSenderId:"463103595080",
appId:"1:463103595080:web:3f0e964edd906fb1d23e7d"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

// Auth guard – redirect to login if not signed in
onAuthStateChanged(auth,(user)=>{
  if(!user){
    window.location.href="login.html";
  } else {
    document.getElementById("userEmail").textContent=user.email;
    document.querySelector(".container").style.display="block";
    loadStudents();
  }
});

async function logout(){
  await signOut(auth);
  window.location.href="login.html";
}

function cleanPhone(phone){
phone=phone.replace(/\D/g,'');
if(!phone.startsWith("91")) phone="91"+phone;
return phone;
}

function sendReminder(phone,name,total){

phone=cleanPhone(phone);

let message=
"Dear Parent,\n\n"+
"Fee for "+name+" ₹"+total+" is overdue.\n"+
"Please make payment immediately.\n\n"+
"Srishti Centre for Performing Arts";

let url="https://api.whatsapp.com/send?phone="+phone+"&text="+encodeURIComponent(message);

window.open(url,'_blank');

}

function sendReceipt(phone,name,amount,receipt,date){

phone=cleanPhone(phone);

let message=
"Srishti Centre for Performing Arts\n\n"+
"RECEIPT\n\n"+
"Receipt No: "+receipt+"\n"+
"Student: "+name+"\n"+
"Amount Paid: ₹"+amount+"\n"+
"Date: "+date+"\n\n"+
"Thank you for your payment.";

let url="https://api.whatsapp.com/send?phone="+phone+"&text="+encodeURIComponent(message);

window.open(url,'_blank');

}

async function loadStudents(){

students=[];

const querySnapshot=await getDocs(collection(db,"students"));

querySnapshot.forEach((docSnap)=>{
let data=docSnap.data();
data.id=docSnap.id;
students.push(data);
});

render();

}

async function addStudent(){

let student={
name:document.getElementById("name").value,
phone:cleanPhone(document.getElementById("phone").value),
course:document.getElementById("course").value,
fee:document.getElementById("fee").value,
due:document.getElementById("due").value,
paid:false
};

await addDoc(collection(db,"students"),student);

document.querySelectorAll("input").forEach(i=>i.value="");

loadStudents();

}

async function markPaid(id){

let receipt="RCPT-"+Date.now();
let date=new Date().toISOString().slice(0,10);

await updateDoc(doc(db,"students",id),{
paid:true,
receiptNumber:receipt,
paidDate:date
});

alert("Payment recorded. Receipt No: "+receipt);

loadStudents();

}

async function deleteStudent(id){

if(!confirm("Delete this student?")) return;

await deleteDoc(doc(db,"students",id));

loadStudents();

}

async function editStudent(id){

let s=students.find(x=>x.id==id);

let newPhone=prompt("Edit phone",s.phone);
let newFee=prompt("Edit fee",s.fee);

await updateDoc(doc(db,"students",id),{
phone:cleanPhone(newPhone),
fee:newFee
});

loadStudents();

}

function paymentQR(name,amount){

let upi="61407789476@icici";

let url=`upi://pay?pa=${upi}&pn=${name}&am=${amount}`;

let qr=`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}`;

window.open(qr,'_blank');

}

function sendReminders(){

students.forEach((s)=>{

let today=new Date();
let due=new Date(s.due);

if(!s.paid && today>due){
sendReminder(s.phone,s.name,s.fee);
}

});

}

function downloadReport(){

let csv="Name,Phone,Course,Fee,Due,Status\n";

students.forEach(s=>{
csv+=`${s.name},${s.phone},${s.course},${s.fee},${s.due},${s.paid?"Paid":"Pending"}\n`;
});

let blob=new Blob([csv]);
let url=URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="fees.csv";
a.click();

}

function render(){

let tbody=document.getElementById("table");
let mobile=document.getElementById("mobileList");

tbody.innerHTML="";
mobile.innerHTML="";

let overdueCount=0;
let collected=0;
let pending=0;

// Get search query
let query=document.getElementById("searchInput").value.trim().toLowerCase();

// Filter students by name
let filtered=query
? students.filter(s=>s.name.toLowerCase().includes(query))
: students;

if(filtered.length===0 && query){
tbody.innerHTML=`<tr><td colspan="11" class="no-results">No student found matching "${query}"</td></tr>`;
mobile.innerHTML=`<div class="no-results">No student found matching "${query}"</div>`;
}

// Dashboard counts use ALL students (not filtered)
students.forEach(s=>{

let today=new Date();
let due=new Date(s.due);
let late=0;

if(!s.paid && today>due){
let diff=Math.floor((today-due)/(1000*60*60*24));
late=diff*10;
overdueCount++;
}

let total=parseInt(s.fee)+late;

if(s.paid)collected+=total;
else pending+=total;

});

// Render only filtered students in table/mobile
filtered.forEach(s=>{

let today=new Date();
let due=new Date(s.due);

let late=0;
let status="Pending";

if(!s.paid && today>due){
let diff=Math.floor((today-due)/(1000*60*60*24));
late=diff*10;
status="Overdue";
}

if(s.paid)status="Paid";

let total=parseInt(s.fee)+late;

let reminder=s.paid
?'<span class="disabled-btn">Paid</span>'
:`<button onclick="sendReminder('${s.phone}','${s.name}','${total}')">Reminder</button>`;

let receipt=s.paid
?`<button onclick="sendReceipt('${s.phone}','${s.name}','${total}','${s.receiptNumber || "N/A"}','${s.paidDate || ""}')">Resend Receipt</button>`
:"";

tbody.innerHTML+=`
<tr>
<td>${s.name}</td>
<td>${s.phone}</td>
<td>${s.course}</td>
<td>₹${s.fee}</td>
<td>₹${late}</td>
<td>₹${total}</td>
<td class="${status=='Overdue'?'overdue':''}">${status}</td>
<td>
<button onclick="editStudent('${s.id}')">Edit</button>
<button onclick="markPaid('${s.id}')">Paid</button>
<button onclick="deleteStudent('${s.id}')">Delete</button>
</td>
<td>${reminder}</td>
<td><button onclick="paymentQR('${s.name}',${total})">QR Pay</button></td>
<td>${receipt}</td>
</tr>
`;

mobile.innerHTML+=`
<div class="mobile-card">

<h3>${s.name}</h3>

Course: ${s.course}<br>
Fee: ₹${total}<br>
Status: <span class="${status=='Overdue'?'overdue':''}">${status}</span>

<br><br>

<button onclick="editStudent('${s.id}')">Edit</button>
<button onclick="markPaid('${s.id}')">Paid</button>
<button onclick="deleteStudent('${s.id}')">Delete</button>

<br><br>

${reminder}

<button onclick="paymentQR('${s.name}',${total})">QR Pay</button>

${receipt}

</div>
`;

});

document.getElementById("students").innerText="Students: "+students.length;
document.getElementById("collected").innerText="Collected: ₹"+collected;
document.getElementById("pending").innerText="Pending: ₹"+pending;
document.getElementById("overdue").innerText="Overdue: "+overdueCount;

}

window.addStudent=addStudent;
window.markPaid=markPaid;
window.deleteStudent=deleteStudent;
window.editStudent=editStudent;
window.paymentQR=paymentQR;
window.sendReminder=sendReminder;
window.sendReminders=sendReminders;
window.sendReceipt=sendReceipt;
window.downloadReport=downloadReport;
window.render=render;
window.logout=logout;

let students=[];

</script>

</body>
</html>
