
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Fee Manager Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;background:#eef2f7;margin:0;padding:20px}
h1{margin-top:0}
.container{max-width:1000px;margin:auto;background:white;padding:20px;border-radius:10px;box-shadow:0 3px 12px rgba(0,0,0,0.15)}
input,button{padding:10px;margin:5px 0;width:100%;border-radius:6px;border:1px solid #ccc}
button{background:#2d89ef;color:white;border:none;cursor:pointer}
button:hover{background:#1b5fbf}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{padding:8px;border-bottom:1px solid #ddd;text-align:left}
.dashboard{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.card{flex:1;background:#2d89ef;color:white;padding:15px;border-radius:8px;min-width:180px}
.whatsapp{background:#25D366;color:white;padding:5px 10px;border-radius:5px;text-decoration:none}
.paid{background:#4CAF50}
.export{background:#ff9800}
</style>
</head>
<body>

<div class="container">

<h1>Student Fee Manager</h1>

<div class="dashboard">
<div class="card" id="students">Students: 0</div>
<div class="card" id="collected">Collected: ₹0</div>
<div class="card" id="pending">Pending: ₹0</div>
<div class="card" id="overdue">Overdue: 0</div>
</div>

<h3>Add Student</h3>

<input id="name" placeholder="Student Name">
<input id="phone" placeholder="Parent Phone (e.g. 919876543210)">
<input id="course" placeholder="Course">
<input id="fee" type="number" placeholder="Fee Amount">
<input id="due" type="date">

<button onclick="addStudent()">Add Student</button>

<button class="export" onclick="exportData()">Export to Excel</button>

<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Course</th>
<th>Fee</th>
<th>Late Fee</th>
<th>Total</th>
<th>Status</th>
<th>Action</th>
<th>Reminder</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

</body>
</html>
