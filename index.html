<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Fee Manager</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2d89ef">

<style>

body{font-family:Arial;background:#eef2f7;margin:0;padding:20px}
h1{margin-top:0}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.15)
}

input,button{
padding:10px;
margin:5px 0;
width:100%;
border-radius:6px;
border:1px solid #ccc
}

button{
background:#2d89ef;
color:white;
border:none;
cursor:pointer
}

button:hover{
background:#1b5fbf
}

.reminder-btn{
background:#e53935;
color:white
}

.reminder-btn:hover{
background:#c62828
}

.dashboard{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap
}

.card{
flex:1;
background:#2d89ef;
color:white;
padding:15px;
border-radius:8px;
min-width:180px
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:left
}

.whatsapp{
background:#25D366;
color:white;
padding:5px 10px;
border-radius:5px;
text-decoration:none
}

/* MOBILE CARD LAYOUT */

.mobile-card{
background:#f8f8f8;
border-radius:10px;
padding:12px;
margin-bottom:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1)
}

.mobile-card h3{
margin:0 0 5px 0
}

.mobile-actions{
margin-top:8px;
display:flex;
gap:10px
}

.mobile-actions button{
width:auto
}

/* hide cards on desktop */

.mobile-list{
display:none
}

/* MOBILE VIEW */

@media (max-width:700px){

table{
display:none
}

.mobile-list{
display:block
}

}

</style>
</head>

<body>

<div class="container">

<h1>Student Fee Manager</h1>

<div class="dashboard">
<div class="card" id="students">Students: 0</div>
<div class="card" id="collected">Collected: ₹0</div>
<div class="card" id="pending">Pending: ₹0</div>
<div class="card" id="overdue">Overdue: 0</div>
</div>

<h3>Add Student</h3>

<button id="reminderButton" class="reminder-btn" onclick="sendReminders()">
Send reminders (0 overdue)
</button>

<input id="name" placeholder="Student Name">
<input id="phone" placeholder="Parent Phone (e.g. 919876543210)">
<input id="course" placeholder="Course">
<input id="fee" type="number" placeholder="Fee Amount">
<input id="due" type="date">

<button onclick="addStudent()">Add Student</button>
<button onclick="downloadReport()">Download Fee Report</button>

<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Course</th>
<th>Fee</th>
<th>Late Fee</th>
<th>Total</th>
<th>Status</th>
<th>Action</th>
<th>Reminder</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<div id="mobileList" class="mobile-list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDHJhlNzrAv5iPgvv5b2WmByfDczJCNkNY",
authDomain: "student-fee-manager-98c51.firebaseapp.com",
projectId: "student-fee-manager-98c51",
storageBucket: "student-fee-manager-98c51.firebasestorage.app",
messagingSenderId: "463103595080",
appId: "1:463103595080:web:3f0e964edd906fb1d23e7d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let students=[];

async function loadStudents(){

students=[];

const querySnapshot = await getDocs(collection(db,"students"));

querySnapshot.forEach((docSnap)=>{

let data = docSnap.data();
data.id = docSnap.id;
students.push(data);

});

render();

}

async function addStudent(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let course=document.getElementById("course").value;
let fee=document.getElementById("fee").value;
let due=document.getElementById("due").value;

if(!name || !phone || !fee || !due){
alert("Please fill required fields");
return;
}

let student={
name:name,
phone:phone,
course:course,
fee:fee,
due:due,
paid:false
};

await addDoc(collection(db,"students"),student);

document.querySelectorAll("input").forEach(i=>i.value="");

loadStudents();

}

async function markPaid(id){

const ref = doc(db,"students",id);
await updateDoc(ref,{paid:true});
loadStudents();

}

function sendReminders(){

students.forEach((s)=>{

let today=new Date();
let due=new Date(s.due);

if(!s.paid && today>due){

let diff=Math.floor((today-due)/(1000*60*60*24));
let late=diff*10;
let total=parseInt(s.fee)+late;

let msg=`Hello, fee for ${s.name} amount ₹${s.fee} was due on ${s.due}. Total due ₹${total}. Please make payment.`;

let link=`https://wa.me/${s.phone}?text=`+encodeURIComponent(msg);

window.open(link,'_blank');

}

});

}

function downloadReport(){

let csv="Name,Phone,Course,Fee,Due Date,Status\n";

students.forEach((s)=>{

let status=s.paid ? "Paid" : "Pending";
csv+=`${s.name},${s.phone},${s.course},${s.fee},${s.due},${status}\n`;

});

let blob=new Blob([csv],{type:"text/csv"});
let url=URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="student_fee_report.csv";
a.click();

}

function render(){

let tbody=document.getElementById("table");
let mobileList=document.getElementById("mobileList");

tbody.innerHTML="";
mobileList.innerHTML="";

let collected=0;
let pending=0;
let overdueCount=0;

students.forEach((s)=>{

let today=new Date();
let due=new Date(s.due);

let late=0;
let status="Pending";

if(!s.paid && today>due){

let diff=Math.floor((today-due)/(1000*60*60*24));
late=diff*10;
status="Overdue";
overdueCount++;

}

if(s.paid) status="Paid";

let total=parseInt(s.fee)+late;

if(s.paid) collected+=total;
else pending+=total;

let msg=`Hello, fee for ${s.name} amount ₹${s.fee} was due on ${s.due}. Total due ₹${total}. Please make payment.`;
let link=`https://wa.me/${s.phone}?text=`+encodeURIComponent(msg);

/* TABLE */

let row=`
<tr>
<td>${s.name}</td>
<td>${s.phone}</td>
<td>${s.course}</td>
<td>₹${s.fee}</td>
<td>₹${late}</td>
<td>₹${total}</td>
<td>${status}</td>
<td><button onclick="markPaid('${s.id}')">Mark Paid</button></td>
<td><a class="whatsapp" target="_blank" href="${link}">Send</a></td>
</tr>
`;

tbody.innerHTML+=row;

/* MOBILE CARD */

let card=`
<div class="mobile-card">

<h3>${s.name}</h3>

Course: ${s.course}<br>
Fee: ₹${s.fee}<br>
Late Fee: ₹${late}<br>
Total: ₹${total}<br>
Status: ${status}

<div class="mobile-actions">

<button onclick="markPaid('${s.id}')">Mark Paid</button>

<a class="whatsapp" target="_blank" href="${link}">Send</a>

</div>

</div>
`;

mobileList.innerHTML+=card;

});

document.getElementById("students").innerText="Students: "+students.length;
document.getElementById("collected").innerText="Collected: ₹"+collected;
document.getElementById("pending").innerText="Pending: ₹"+pending;
document.getElementById("overdue").innerText="Overdue: "+overdueCount;

document.getElementById("reminderButton").innerText =
"Send reminders ("+overdueCount+" overdue)";

}

window.addStudent = addStudent;
window.sendReminders = sendReminders;
window.markPaid = markPaid;
window.downloadReport = downloadReport;

loadStudents();

</script>

</body>
</html>
