<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Srishti Centre Fee Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#eef2f7;
margin:0;
padding:20px;
}

/* LOGIN */

#loginPage{
max-width:400px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.15);
}

#appPage{
display:none;
}

input,button{
padding:10px;
margin:5px 0;
width:100%;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#2d89ef;
color:white;
border:none;
cursor:pointer;
}

.header{
background:#2d89ef;
color:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

.dashboard{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

.card{
flex:1;
background:#2d89ef;
color:white;
padding:15px;
border-radius:8px;
text-align:center;
}

</style>

</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage">

<h2>Srishti Centre Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<!-- APP PAGE -->

<div id="appPage">

<div class="header">

<h2>Srishti Centre for Performing Arts</h2>

<button onclick="logout()">Logout</button>

</div>

<div class="dashboard">

<div class="card" id="students">Students: 0</div>
<div class="card" id="collected">Collected: ₹0</div>
<div class="card" id="pending">Pending: ₹0</div>
<div class="card" id="overdue">Overdue: 0</div>

</div>

<input id="name" placeholder="Student Name">
<input id="phone" placeholder="Parent Phone">
<input id="course" placeholder="Course">
<input id="fee" type="number" placeholder="Fee">
<input id="due" type="date">

<button onclick="addStudent()">Add Student</button>

<table border="1" width="100%" id="table"></table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { getFirestore,collection,addDoc,getDocs,updateDoc,doc }

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { getAuth,signInWithEmailAndPassword,signOut }

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyDHJhlNzrAv5iPgvv5b2WmByfDczJCNkNY",
authDomain:"student-fee-manager-98c51.firebaseapp.com",
projectId:"student-fee-manager-98c51",
storageBucket:"student-fee-manager-98c51.firebasestorage.app",
messagingSenderId:"463103595080",
appId:"1:463103595080:web:3f0e964edd906fb1d23e7d"
};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

const auth=getAuth(app);

let students=[];

/* LOGIN */

window.login=async function(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

await signInWithEmailAndPassword(auth,email,password);

document.getElementById("loginPage").style.display="none";
document.getElementById("appPage").style.display="block";

loadStudents();

}

/* LOGOUT */

window.logout=function(){

signOut(auth);

document.getElementById("loginPage").style.display="block";
document.getElementById("appPage").style.display="none";

}

/* ADD STUDENT */

window.addStudent=async function(){

let student={

name:document.getElementById("name").value,

phone:document.getElementById("phone").value,

course:document.getElementById("course").value,

fee:document.getElementById("fee").value,

due:document.getElementById("due").value,

paid:false

};

await addDoc(collection(db,"students"),student);

loadStudents();

}

/* LOAD STUDENTS */

async function loadStudents(){

students=[];

const querySnapshot=await getDocs(collection(db,"students"));

querySnapshot.forEach((docSnap)=>{

let data=docSnap.data();

data.id=docSnap.id;

students.push(data);

});

render();

}

/* RENDER */

function render(){

let table=document.getElementById("table");

table.innerHTML="<tr><th>Name</th><th>Course</th><th>Fee</th></tr>";

students.forEach(s=>{

table.innerHTML+=`

<tr>

<td>${s.name}</td>

<td>${s.course}</td>

<td>${s.fee}</td>

</tr>

`;

});

document.getElementById("students").innerText="Students: "+students.length;

}

</script>

</body>

</html>
